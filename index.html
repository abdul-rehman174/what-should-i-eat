<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>What Should I Eat? 🍽️</title>
<meta name="description" content="Cannot decide what to eat? Get a random Pakistani hostel meal suggestion in one tap." />
<meta name="theme-color" content="#0f0f1e" />

<!-- Favicon + install -->
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Eat" />

<!-- Social preview (Open Graph) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="What Should I Eat?" />
<meta property="og:description" content="Cannot decide what to eat? Get a random Pakistani hostel meal suggestion in one tap." />
<meta property="og:image" content="icon-512.png" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="What Should I Eat?" />
<meta name="twitter:description" content="Get a random Pakistani hostel meal suggestion in one tap." />
<meta name="twitter:image" content="icon-512.png" />
<style>
  :root {
    --bg: #0f0f1e;
    --accent: #ff6b6b;
    --accent2: #feca57;
    --text: #e8e8f0;
    --muted: #9090a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; overflow: hidden;
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(90px);
    opacity: 0.45; z-index: 0; animation: float 16s ease-in-out infinite;
  }
  .blob1 { width: 420px; height: 420px; background: var(--accent); top: -120px; left: -100px; }
  .blob2 { width: 380px; height: 380px; background: var(--accent2); bottom: -140px; right: -90px; animation-delay: -8s; }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(50px,-40px) scale(1.12); }
  }

  .wrap { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 560px; }

  h1 {
    font-size: 38px; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { color: var(--muted); margin-bottom: 28px; font-size: 16px; }

  /* category pills */
  .cats { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
  .cats button {
    font-size: 15px; padding: 10px 20px; border-radius: 999px; cursor: pointer;
    color: var(--text); background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); transition: all .2s ease; font-weight: 500;
  }
  .cats button:hover { transform: translateY(-2px); border-color: var(--accent); }
  .cats button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent; color: #1a1a2e; font-weight: 700;
  }

  /* the display window */
  .display {
    background: rgba(26,26,46,0.7); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
    padding: 48px 24px; margin-bottom: 28px; min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  .result { font-size: 40px; font-weight: 700; transition: opacity .1s; line-height: 1.3; }
  .result.spinning { opacity: 0.85; filter: blur(0.4px); }
  .placeholder { font-size: 22px; color: var(--muted); font-weight: 500; }

  /* main button */
  .spin-btn {
    font-size: 20px; font-weight: 700; padding: 18px 48px; border: none;
    border-radius: 999px; cursor: pointer; color: #1a1a2e;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 10px 30px rgba(255,107,107,0.45); transition: all .2s ease;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(255,107,107,0.6); }
  .spin-btn:active:not(:disabled) { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.6; cursor: default; }

  .footer { margin-top: 26px; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="wrap">
    <h1>What Should I Eat?</h1>
    <p class="sub">Can't decide? Let fate pick for you. 🎰</p>

    <div class="cats" id="cats"></div>

    <div class="display">
      <div class="placeholder" id="display">Pick a category, then hit Spin 👇</div>
    </div>

    <button class="spin-btn" id="spinBtn">🎲 Spin!</button>

    <p class="footer">Made with ❤️ on my new Mac</p>
  </div>

  <script>
    const FOODS = {
      "Anything":  [],  // filled below with everything
      "Breakfast": ["Anda paratha 🍳","Chai + rusk ☕","Halwa puri (weekend) 🫓","Omelette + bread 🍳","Aloo paratha 🥔","Channay 🫘","Doodh patti ☕","Nan channay 🫓"],
      "Lunch":     ["Daal chawal 🍛","Aloo gosht 🥔","Channay 🫘","Mess biryani 🍚","Qeema 🍖","Sabzi + roti 🥬","Chicken salan 🍗","Aloo qeema 🥔"],
      "Dinner":    ["Daal roti 🍞","Anda curry 🍳","Aloo bhujia 🥔","Karahi (jab paisa ho) 🍗","Channay chawal 🫘","Mixed sabzi 🥬","Nihari (Sunday) 🍲","Haleem 🍲"],
      "Snack":     ["Samosa 🥟","Pakoray 🧅","Bun kabab 🍔","Anda shami 🍳","Maggi noodles 🍜","Chai + biscuit 🍪","Paratha roll 🌯","Rolls 🌯"],
      "Broke 💸":  ["Plain roti + achaar 🥬","Daal chawal (again) 🍛","Anda + bread 🍳","Bread + jam 🍞","Chai + rusk ☕","Maggi 🍜","Sirf chai 🥲☕"],
    };
    FOODS["Anything"] = Object.values(FOODS).flat();

    let current = "Anything";
    let spinning = false;
    let lastPick = null;  // remember last result so we don't repeat it

    const catsEl = document.getElementById('cats');
    const displayEl = document.getElementById('display');
    const btn = document.getElementById('spinBtn');

    // build category pills
    Object.keys(FOODS).forEach(cat => {
      const b = document.createElement('button');
      b.textContent = cat;
      if (cat === current) b.classList.add('active');
      b.onclick = () => {
        if (spinning) return;
        current = cat;
        [...catsEl.children].forEach(c => c.classList.remove('active'));
        b.classList.add('active');
      };
      catsEl.appendChild(b);
    });

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // pick a final answer that isn't the same as last time
    function pickFresh(options) {
      if (options.length < 2) return rand(options);
      let choice;
      do { choice = rand(options); } while (choice === lastPick);
      lastPick = choice;
      return choice;
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      btn.disabled = true;
      const options = FOODS[current];

      displayEl.className = 'result spinning';
      let ticks = 0;
      const totalTicks = 18;

      const iv = setInterval(() => {
        displayEl.textContent = rand(options);
        ticks++;
        // slow down toward the end for suspense
        if (ticks >= totalTicks) {
          clearInterval(iv);
          const final = pickFresh(options);
          displayEl.textContent = final;
          displayEl.className = 'result';
          // little celebration pop
          displayEl.animate(
            [{ transform: 'scale(0.7)' }, { transform: 'scale(1.15)' }, { transform: 'scale(1)' }],
            { duration: 400, easing: 'ease-out' }
          );
          spinning = false;
          btn.disabled = false;
          btn.textContent = '🎲 Spin again!';
        }
      }, 70 + ticks * 4);
    }

    btn.onclick = spin;
    // keyboard: press Space or Enter to spin
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); spin(); }
    });

    // installable PWA + auto-update (refreshes when a new version is deployed)
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return; refreshing = true; location.reload();
      });
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('sw.js');
          reg.update().catch(() => {});
          setInterval(() => reg.update().catch(() => {}), 60000);
          document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update().catch(() => {}); });
        } catch (_) {}
      });
    }
  </script>
</body>
</html>
